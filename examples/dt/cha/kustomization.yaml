# This is the kustomization for the FINAL step, edpm-post-ceph
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
  - ../../../va/hci/edpm-post-ceph/nodeset

resources:
  - control-plane/networking/nncp/values.yaml
  - edpm-pre-ceph/nodeset/values.yaml
  - service-values.yaml
  - values.yaml

replacements:
  # add external storage true for testing without RWX PVCs
  - source:
      kind: ConfigMap
      name: service-values
      fieldPath: data.glance.glanceAPIs.default.storage
    targets:
      - select:
          kind: OpenStackControlPlane
        fieldPaths:
          - spec.glance.template.glanceAPIs.default.storage
        options:
          create: true

  # add topologyRef.name to spread manila scheduler pods across zones
  - source:
      kind: ConfigMap
      name: service-values
      fieldPath: data.manila.manilaAPI.topologyRef.name
    targets:
      - select:
          kind: OpenStackControlPlane
        fieldPaths:
          - spec.manila.template.manilaAPI.topologyRef.name
        options:
          create: true

  # add topologyRef.name to spread manila API pods across zones
  - source:
      kind: ConfigMap
      name: service-values
      fieldPath: data.manila.manilaScheduler.topologyRef.name
    targets:
      - select:
          kind: OpenStackControlPlane
        fieldPaths:
          - spec.manila.template.manilaScheduler.topologyRef.name
        options:
          create: true

  # add manila share1 to A zone
  - source:
      kind: ConfigMap
      name: service-values
      fieldPath: data.manila.manilaShares.share1.topologyRef.name
    targets:
      - select:
          kind: OpenStackControlPlane
        fieldPaths:
          - spec.manila.template.manilaShares.share1.topologyRef.name
        options:
          create: true

  # add topologyRef.name to spread default glance pods across zones
  - source:
      kind: ConfigMap
      name: service-values
      fieldPath: data.glance.glanceAPIs.default.topologyRef.name
    targets:
      - select:
          kind: OpenStackControlPlane
        fieldPaths:
          - spec.glance.template.glanceAPIs.default.topologyRef.name
        options:
          create: true

  # add azone edge pods with azone affinity
  - source:
      kind: ConfigMap
      name: service-values
      fieldPath: data.glance.glanceAPIs.azone
    targets:
      - select:
          kind: OpenStackControlPlane
        fieldPaths:
          - spec.glance.template.glanceAPIs.azone
        options:
          create: true

  # add bzone edge pods with bzone affinity
  - source:
      kind: ConfigMap
      name: service-values
      fieldPath: data.glance.glanceAPIs.bzone
    targets:
      - select:
          kind: OpenStackControlPlane
        fieldPaths:
          - spec.glance.template.glanceAPIs.bzone
        options:
          create: true

  # add czone edge pods with czone affinity
  - source:
      kind: ConfigMap
      name: service-values
      fieldPath: data.glance.glanceAPIs.czone
    targets:
      - select:
          kind: OpenStackControlPlane
        fieldPaths:
          - spec.glance.template.glanceAPIs.czone
        options:
          create: true

  # add topologyRef.name to spread default cinderAPI pods across zones
  - source:
      kind: ConfigMap
      name: service-values
      fieldPath: data.cinderAPI.topologyRef.name
    targets:
      - select:
          kind: OpenStackControlPlane
        fieldPaths:
          - spec.cinder.template.cinderAPI.topologyRef.name
        options:
          create: true

  # add topologyRef.name to spread default cinderScheduler pods across zones
