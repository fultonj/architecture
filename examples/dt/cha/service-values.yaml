# local-config: referenced, but not emitted by kustomize
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-values
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  preserveJobs: false

  extraMounts:
    - name: v1
      region: r1
      extraVol:
        - propagation:
            - CinderVolume
            - CinderBackup
            - GlanceAPI
            - ManilaShare
          extraVolType: Ceph
          volumes:
            - name: ceph
              projected:
                sources:
                  - secret:
                      name: ceph-conf-files
          mounts:
            - name: ceph
              mountPath: /etc/ceph
              readOnly: true

  glance:
    customServiceConfig: |
      [DEFAULT]
      enabled_backends = default_backend:rbd
      [glance_store]
      default_backend = default_backend
      [default_backend]
      rbd_store_ceph_conf = /etc/ceph/ceph.conf
      store_description = "RBD backend"
      rbd_store_pool = images
      rbd_store_user = openstack
      rbd_thin_provisioning = True
    glanceAPIs:
      azone:
        topologyRef:
          name: azone-node-affinity
        replicas: 2
        type: edge
        storage:
          external: true
      bzone:
        topologyRef:
          name: bzone-node-affinity
        replicas: 2
        type: edge
        storage:
          external: true
      czone:
        topologyRef:
          name: czone-node-affinity
        replicas: 2
        type: edge
        storage:
          external: true
      default:
        replicas: 3
        storage:
          external: true
        topologyRef:
          name: default-spread-pods

  cinderAPI:
    replicas: 3
    topologyRef:
      name: default-spread-pods
  cinderScheduler:
    replicas: 1
    topologyRef:
      name: default-spread-pods
  cinderBackup:
    replicas: 1
    topologyRef:
      name: azone-node-affinity
    customServiceConfig: |
      [DEFAULT]
      backup_driver = cinder.backup.drivers.ceph.CephBackupDriver
      backup_ceph_pool = backups
      backup_ceph_user = openstack
  cinderVolumes:
    ceph:
      topologyRef:
        name: azone-node-affinity
      customServiceConfig: |
        [DEFAULT]
        enabled_backends = ceph
        [ceph]
        volume_backend_name = ceph
        volume_driver = cinder.volume.drivers.rbd.RBDDriver
        rbd_ceph_conf = /etc/ceph/ceph.conf
        rbd_user = openstack
        rbd_pool = volumes
        rbd_flatten_volume_from_snapshot = False
        rbd_secret_uuid = CHANGEME

  manila:
    enabled: true
    manilaAPI:
      replicas: 3
      topologyRef:
        name: default-spread-pods
      customServiceConfig: |
        [DEFAULT]
        enabled_share_protocols=cephfs
    manilaScheduler:
      replicas: 3
      topologyRef:
        name: default-spread-pods
    manilaShares:
      share1:
        replicas: 1
        topologyRef:
          name: azone-node-affinity
        customServiceConfig: |
          [DEFAULT]
          debug = true
          enabled_share_backends = cephfs
          [cephfs]
          driver_handles_share_servers = False
          share_backend_name = cephfs
          share_driver = manila.share.drivers.cephfs.driver.CephFSDriver
          cephfs_conf_path = /etc/ceph/ceph.conf
          cephfs_cluster_name = ceph
          cephfs_auth_id=openstack
          cephfs_volume_mode = 0755
          cephfs_protocol_helper_type = CEPHFS
  barbican:
    barbicanAPI:
      topologyRef:
        name: default-spread-pods
    barbicanKeystoneListener:
      topologyRef:
        name: default-spread-pods
    barbicanWorker:
      topologyRef:
        name: default-spread-pods
  galera:
    openstack:
      topologyRef:
        name: default-spread-pods
    openstack-cell1:
      topologyRef:
        name: default-spread-pods
  heat:
    heatAPI:
      topologyRef:
        name: default-spread-pods
    heatEngine:
      topologyRef:
        name: default-spread-pods
  horizon:
    topologyRef:
      name: default-spread-pods
  ironic:
    ironicAPI:
      topologyRef:
        name: default-spread-pods
    ironicInspector:
      topologyRef:
        name: default-spread-pods
    ironicNeutronAgent:
      topologyRef:
        name: default-spread-pods
  keystone:
    topologyRef:
      name: default-spread-pods
  neutron:
    topologyRef:
      name: default-spread-pods
  nova:
    apiServiceTemplate:
      topologyRef:
        name: default-spread-pods
    cellTemplates:
      cell0:
        conductorServiceTemplate:
          topologyRef:
            name: default-spread-pods
      cell1:
        conductorServiceTemplate:
          topologyRef:
            name: default-spread-pods
    metadataServiceTemplate:
      topologyRef:
        name: default-spread-pods
    schedulerServiceTemplate:
      topologyRef:
        name: default-spread-pods
  octavia:
    octaviaAPI:
      topologyRef:
        name: default-spread-pods
    octaviaHealthManager:
      topologyRef:
        name: default-spread-pods
    octaviaHousekeeping:
      topologyRef:
        name: default-spread-pods
    octaviaWorker:
      topologyRef:
        name: default-spread-pods
  placement:
    topologyRef:
      name: default-spread-pods
  ovn:
    ovnController:
      topologyRef:
        name: default-spread-pods
    ovnNorthd:
      topologyRef:
        name: default-spread-pods
    ovnDBCluster:
      ovndbcluster-nb:
        topologyRef:
          name: default-spread-pods
      ovndbcluster-sb:
        topologyRef:
          name: default-spread-pods
  ceilometer:
    topologyRef:
      name: default-spread-pods
  telemetry:
    topologyRef:
      name: default-spread-pods
  memcached:
    topologyRef:
      name: default-spread-pods
